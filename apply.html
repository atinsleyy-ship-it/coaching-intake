<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Apply for online coaching — fill out this short intake form to get started.">
  <title>Apply for Coaching</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">

    <header class="header">
      <h1>Apply for <span>Coaching</span></h1>
      <p class="subtitle">Fill out the form below and I'll be in touch within 24 hours.</p>
    </header>

    <form id="intakeForm" novalidate>

      <!-- ── Personal Information ─────────────────────────────────────────── -->
      <section class="form-section">
        <h2 class="section-title">Personal Information</h2>

        <div class="field">
          <label for="name">Full Name <span class="required">*</span></label>
          <input type="text" id="name" name="name"
            placeholder="Jane Smith" autocomplete="name">
          <span class="error" id="nameError" role="alert"></span>
        </div>

        <div class="field">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email"
            placeholder="jane@example.com" autocomplete="email">
          <span class="error" id="emailError" role="alert"></span>
        </div>

        <div class="field">
          <label for="phone">Phone <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone"
            placeholder="(555) 000-0000" autocomplete="tel">
          <span class="error" id="phoneError" role="alert"></span>
        </div>

        <div class="row">
          <div class="field">
            <label for="age">Age <span class="required">*</span></label>
            <input type="number" id="age" name="age"
              placeholder="28" min="13" max="100">
            <span class="error" id="ageError" role="alert"></span>
          </div>

          <div class="field">
            <label for="biologicalSex">Biological Sex <span class="required">*</span></label>
            <select id="biologicalSex" name="biologicalSex">
              <option value="">Select…</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Prefer not to say">Prefer not to say</option>
            </select>
            <span class="error" id="biologicalSexError" role="alert"></span>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="height">Height</label>
            <input type="text" id="height" name="height"
              placeholder="5'10&quot;">
          </div>

          <div class="field">
            <label for="weight">Weight (lbs) <span class="required">*</span></label>
            <input type="number" id="weight" name="weight"
              placeholder="165" min="50" max="700">
            <span class="error" id="weightError" role="alert"></span>
          </div>
        </div>
      </section>

      <!-- ── Training ─────────────────────────────────────────────────────── -->
      <section class="form-section">
        <h2 class="section-title">Training</h2>

        <div class="field">
          <label for="primaryGoal">Primary Goal <span class="required">*</span></label>
          <select id="primaryGoal" name="primaryGoal">
            <option value="">Select…</option>
            <option value="Lose fat">Lose fat</option>
            <option value="Build muscle">Build muscle</option>
            <option value="Improve strength">Improve strength</option>
            <option value="Improve endurance">Improve endurance</option>
            <option value="Athletic performance">Athletic performance</option>
            <option value="Body recomposition">Body recomposition</option>
            <option value="General fitness">General fitness</option>
          </select>
          <span class="error" id="primaryGoalError" role="alert"></span>
        </div>

        <div class="field">
          <label for="experience">Training Experience <span class="required">*</span></label>
          <select id="experience" name="experience">
            <option value="">Select…</option>
            <option value="Beginner (0–1 years)">Beginner (0–1 years)</option>
            <option value="Intermediate (1–3 years)">Intermediate (1–3 years)</option>
            <option value="Advanced (3+ years)">Advanced (3+ years)</option>
          </select>
          <span class="error" id="experienceError" role="alert"></span>
        </div>

        <div class="row">
          <div class="field">
            <label for="daysPerWeek">Days per Week <span class="required">*</span></label>
            <select id="daysPerWeek" name="daysPerWeek">
              <option value="">Select…</option>
              <option value="2">2 days</option>
              <option value="3">3 days</option>
              <option value="4">4 days</option>
              <option value="5">5 days</option>
              <option value="6">6 days</option>
            </select>
            <span class="error" id="daysPerWeekError" role="alert"></span>
          </div>

          <div class="field">
            <label for="preferredSplit">Preferred Split</label>
            <select id="preferredSplit" name="preferredSplit">
              <option value="">Select…</option>
              <option value="Full body">Full body</option>
              <option value="Upper / Lower">Upper / Lower</option>
              <option value="Push / Pull / Legs">Push / Pull / Legs</option>
              <option value="Bro split">Bro split</option>
              <option value="No preference">No preference</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label for="injuries">Injuries / Limitations</label>
          <textarea id="injuries" name="injuries" rows="3"
            placeholder="Describe any injuries, chronic pain, or physical limitations…"></textarea>
        </div>
      </section>

      <!-- ── Lifestyle & Nutrition ─────────────────────────────────────────── -->
      <section class="form-section">
        <h2 class="section-title">Lifestyle &amp; Nutrition</h2>

        <div class="field">
          <label for="currentDiet">Current Diet</label>
          <select id="currentDiet" name="currentDiet">
            <option value="">Select…</option>
            <option value="No specific diet">No specific diet</option>
            <option value="High protein">High protein</option>
            <option value="Keto / Low carb">Keto / Low carb</option>
            <option value="Vegan">Vegan</option>
            <option value="Vegetarian">Vegetarian</option>
            <option value="Paleo">Paleo</option>
            <option value="Intermittent fasting">Intermittent fasting</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="row">
          <div class="field">
            <label for="waterPerDay">Water per Day (oz) <span class="required">*</span></label>
            <input type="number" id="waterPerDay" name="waterPerDay"
              placeholder="80" min="0" max="300">
            <span class="error" id="waterPerDayError" role="alert"></span>
          </div>

          <div class="field">
            <label for="alcoholPerWeek">Alcohol (drinks / week) <span class="required">*</span></label>
            <input type="number" id="alcoholPerWeek" name="alcoholPerWeek"
              placeholder="0" min="0" max="50">
            <span class="error" id="alcoholPerWeekError" role="alert"></span>
          </div>
        </div>

        <div class="field">
          <label for="startDate">Desired Start Date <span class="required">*</span></label>
          <input type="date" id="startDate" name="startDate">
          <span class="error" id="startDateError" role="alert"></span>
        </div>
      </section>

      <!-- ── Submit ────────────────────────────────────────────────────────── -->
      <div class="submit-area">
        <button type="submit" id="submitBtn">
          <span class="btn-text">Submit Application</span>
          <span class="btn-loading" hidden>Submitting</span>
        </button>
      </div>

    </form><!-- /#intakeForm -->

    <!-- Success state (replaces the form) -->
    <div id="successMessage" class="success-message" hidden aria-live="polite">
      <div class="success-icon" aria-hidden="true">✓</div>
      <h2>Application Received</h2>
      <p>Thank you! I'll review your information and reach out within 24 hours.</p>
    </div>

    <!-- Error banner (shown above the submit button on failure) -->
    <div id="errorBanner" class="error-banner" hidden role="alert">
      <p id="errorText">Something went wrong. Please try again.</p>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
